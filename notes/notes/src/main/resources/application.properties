spring.application.name=notes
server.port=8085

spring.security.user.name=user
spring.security.user.password=password

spring.datasource.url=jdbc:mysql://localhost:3306/securenotes
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.app.jwtSecret=mySecretKey123@#$
spring.app.jwtExpirationMs=172800000 # 2 days

# Logging
logging.level.org.springframework.security=DEBUG
# use this to see the logs of spring security